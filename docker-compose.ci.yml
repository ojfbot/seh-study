version: '3.8'

# CI-specific Docker Compose configuration for SEH Study
# Visual regression testing with Playwright in containers

services:
  # Browser App - React UI
  browser-app:
    build:
      context: .
      dockerfile: packages/browser-app/Dockerfile
      target: production
      args:
        NODE_VERSION: '24'
        VITE_API_URL: http://api:3031/api
    container_name: sehstudy-browser-ci
    ports:
      - "3030:3030"
    environment:
      - NODE_ENV=test
      - CI=true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3030"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    networks:
      - test-network

  # API Server
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: production
      args:
        NODE_VERSION: '24'
    container_name: sehstudy-api-ci
    ports:
      - "3031:3031"
    environment:
      - NODE_ENV=test
      - CI=true
      - PORT=3031
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3031/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - test-network

  # Browser Automation - Playwright testing service
  browser-automation:
    build:
      context: .
      dockerfile: packages/browser-automation/Dockerfile
      args:
        PLAYWRIGHT_VERSION: '1.40.0'
    container_name: sehstudy-automation-ci
    ports:
      - "3033:3033"
    environment:
      - NODE_ENV=test
      - CI=true
      - PORT=3033
      - HEADLESS=true
      - BROWSER_APP_URL=http://browser-app:3030
      - APP_URL=http://browser-app:3030
      - SCREENSHOTS_DIR=/app/temp/screenshots
      - SCREENSHOT_MAX_AGE_DAYS=7
      - DISABLE_ANIMATIONS=true
      - PLAYWRIGHT_BROWSER_EXECUTABLE_PATH=/ms-playwright/chromium-*/chrome-linux/chrome
    volumes:
      - ./packages/browser-automation/test-baselines:/app/test-baselines:ro
      - ./temp/screenshots:/app/temp/screenshots
      - ./temp/test-results:/app/test-results
    depends_on:
      browser-app:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3033/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - test-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

networks:
  test-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.36.0.0/16
